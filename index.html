<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movie Catalog</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      padding: 1.2rem 2rem;
      border-bottom: 2px solid #e94560;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 1.6rem;
      color: #e94560;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem;
    }

    .form-card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .form-card h2 {
      color: #e94560;
      margin-bottom: 1rem;
      font-size: 1.1rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 1rem;
    }

    .form-grid input, .form-grid select {
      background: #0f0f1a;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 10px 12px;
      color: #e0e0e0;
      font-size: 14px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-grid input:focus, .form-grid select:focus {
      border-color: #e94560;
    }

    .form-grid input::placeholder { color: #555; }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.97); }

    .btn-primary { background: #e94560; color: white; }
    .btn-danger  { background: #c0392b; color: white; padding: 6px 12px; font-size: 12px; }
    .btn-edit    { background: #2980b9; color: white; padding: 6px 12px; font-size: 12px; }
    .btn-save    { background: #27ae60; color: white; padding: 6px 10px; font-size: 12px; }
    .btn-cancel  { background: #555;    color: white; padding: 6px 10px; font-size: 12px; }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .section-header h2 { font-size: 1.1rem; color: #aaa; }
    .count-badge {
      background: #e94560;
      color: white;
      font-size: 12px;
      padding: 2px 10px;
      border-radius: 20px;
    }

    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .movie-card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 1.2rem;
      transition: border-color 0.2s;
    }

    .movie-card:hover { border-color: #e94560; }

    .movie-card h3 {
      font-size: 1rem;
      color: #fff;
      margin-bottom: 4px;
    }

    .movie-card .director {
      font-size: 13px;
      color: #888;
      margin-bottom: 10px;
    }

    .movie-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      background: #0f0f1a;
      color: #aaa;
      border: 1px solid #2a2a4a;
    }

    .badge.genre   { color: #a29bfe; border-color: #a29bfe44; }
    .badge.year    { color: #74b9ff; border-color: #74b9ff44; }
    .badge.lang    { color: #55efc4; border-color: #55efc444; }

    .rating-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .rating-label { font-size: 12px; color: #888; }

    .rating-display {
      font-size: 14px;
      font-weight: 700;
      color: #f9ca24;
    }

    .inline-edit {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .inline-edit input {
      width: 60px;
      background: #0f0f1a;
      border: 1px solid #e94560;
      border-radius: 6px;
      padding: 4px 8px;
      color: #f9ca24;
      font-size: 13px;
      outline: none;
    }

    .duration-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .duration-display { font-size: 13px; color: #aaa; }

    .card-actions { display: flex; gap: 8px; }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #444;
      font-size: 15px;
      grid-column: 1/-1;
    }

    #status-msg {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #27ae60;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
      z-index: 999;
    }
  </style>
</head>
<body>

<header>
  <span style="font-size:1.8rem;">🎬</span>
  <h1>Movie Catalog</h1>
</header>

<div class="container">

  <div class="form-card">
    <h2>➕ Add New Movie</h2>
    <div class="form-grid">
      <input id="title"       type="text"   placeholder="Title *" />
      <input id="director"    type="text"   placeholder="Director *" />
      <input id="genre"       type="text"   placeholder="Genre" />
      <input id="releaseYear" type="number" placeholder="Release Year" />
      <input id="rating"      type="number" placeholder="Rating (0-10)" min="0" max="10" step="0.1"/>
      <input id="duration"    type="number" placeholder="Duration (mins)" />
      <input id="language"    type="text"   placeholder="Language (default: English)" />
    </div>
    <button class="btn btn-primary" onclick="addMovie()">Add Movie</button>
  </div>

  <div class="section-header">
    <h2>All Movies</h2>
    <span class="count-badge" id="movie-count">0 movies</span>
  </div>

  <div class="movies-grid" id="movies-container">
    <div class="empty-state">Loading movies...</div>
  </div>

</div>

<div id="status-msg"></div>

<script>
  const API = '/api/movies';

  async function fetchMovies() {
    try {
      const res = await fetch(API);
      const movies = await res.json();
      renderMovies(movies);
    } catch (err) {
      document.getElementById('movies-container').innerHTML =
        '<div class="empty-state">⚠️ Could not connect to server.</div>';
    }
  }

  function renderMovies(movies) {
    const container = document.getElementById('movies-container');
    document.getElementById('movie-count').textContent =
      movies.length + ' movie' + (movies.length !== 1 ? 's' : '');

    if (movies.length === 0) {
      container.innerHTML = '<div class="empty-state">No movies yet. Add one above!</div>';
      return;
    }

    container.innerHTML = movies.map(m => `
      <div class="movie-card" id="card-${m._id}">
        <h3>${m.title}</h3>
        <p class="director">🎬 ${m.director}</p>
        <div class="movie-meta">
          ${m.genre       ? `<span class="badge genre">${m.genre}</span>` : ''}
          ${m.releaseYear ? `<span class="badge year">${m.releaseYear}</span>` : ''}
          ${m.language    ? `<span class="badge lang">${m.language}</span>` : ''}
        </div>

        <div class="rating-row">
          <span class="rating-label">⭐ Rating:</span>
          <span class="rating-display" id="rating-display-${m._id}">${m.rating ?? 'N/A'}</span>
          <div class="inline-edit" id="rating-edit-${m._id}" style="display:none;">
            <input type="number" id="rating-input-${m._id}" value="${m.rating ?? ''}" min="0" max="10" step="0.1"/>
            <button class="btn btn-save" onclick="saveRating('${m._id}')">Save</button>
            <button class="btn btn-cancel" onclick="cancelEdit('${m._id}', 'rating')">✕</button>
          </div>
          <button class="btn btn-edit" id="rating-btn-${m._id}" onclick="editField('${m._id}', 'rating')">Edit</button>
        </div>

        <div class="duration-row">
          <span class="rating-label">⏱ Duration:</span>
          <span class="duration-display" id="duration-display-${m._id}">${m.duration ? m.duration + ' min' : 'N/A'}</span>
          <div class="inline-edit" id="duration-edit-${m._id}" style="display:none;">
            <input type="number" id="duration-input-${m._id}" value="${m.duration ?? ''}"/>
            <button class="btn btn-save" onclick="saveDuration('${m._id}')">Save</button>
            <button class="btn btn-cancel" onclick="cancelEdit('${m._id}', 'duration')">✕</button>
          </div>
          <button class="btn btn-edit" id="duration-btn-${m._id}" onclick="editField('${m._id}', 'duration')">Edit</button>
        </div>

        <div class="card-actions">
          <button class="btn btn-danger" onclick="deleteMovie('${m._id}')">🗑 Delete</button>
        </div>
      </div>
    `).join('');
  }

  async function addMovie() {
    const title    = document.getElementById('title').value.trim();
    const director = document.getElementById('director').value.trim();

    if (!title || !director) {
      showStatus('Title and Director are required!', '#e74c3c');
      return;
    }

    const body = {
      title,
      director,
      genre:       document.getElementById('genre').value.trim() || undefined,
      releaseYear: document.getElementById('releaseYear').value || undefined,
      rating:      document.getElementById('rating').value || undefined,
      duration:    document.getElementById('duration').value || undefined,
      language:    document.getElementById('language').value.trim() || undefined,
    };

    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (res.ok) {
      ['title','director','genre','releaseYear','rating','duration','language']
        .forEach(id => document.getElementById(id).value = '');
      showStatus('Movie added!');
      fetchMovies();
    } else {
      const err = await res.json();
      showStatus('Error: ' + err.details, '#e74c3c');
    }
  }

  async function deleteMovie(id) {
    if (!confirm('Delete this movie?')) return;
    const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
    if (res.ok) {
      showStatus('Movie deleted.');
      fetchMovies();
    }
  }

  function editField(id, field) {
    document.getElementById(`${field}-display-${id}`).style.display = 'none';
    document.getElementById(`${field}-edit-${id}`).style.display = 'flex';
    document.getElementById(`${field}-btn-${id}`).style.display = 'none';
  }

  function cancelEdit(id, field) {
    document.getElementById(`${field}-display-${id}`).style.display = 'inline';
    document.getElementById(`${field}-edit-${id}`).style.display = 'none';
    document.getElementById(`${field}-btn-${id}`).style.display = 'inline-block';
  }

  async function saveRating(id) {
    const val = document.getElementById(`rating-input-${id}`).value;
    await updateMovie(id, { rating: parseFloat(val) });
  }

  async function saveDuration(id) {
    const val = document.getElementById(`duration-input-${id}`).value;
    await updateMovie(id, { duration: parseInt(val) });
  }

  async function updateMovie(id, data) {
    const res = await fetch(`${API}/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (res.ok) {
      showStatus('Updated!');
      fetchMovies();
    }
  }

  function showStatus(msg, color = '#27ae60') {
    const el = document.getElementById('status-msg');
    el.textContent = msg;
    el.style.background = color;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 2500);
  }

  fetchMovies();
</script>
</body>
</html>q
